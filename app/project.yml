name: AssetStudio
options:
  bundleIdPrefix: dev.asuna
  deploymentTarget:
    macOS: "26.0"
targets:
  AssetStudio:
    type: application
    platform: macOS
    sources: [Sources]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.asuna.AssetStudio
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        SWIFT_STRICT_CONCURRENCY: complete
  AssetStudioTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests]
    dependencies:
      - target: AssetStudio
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AssetStudio.app/Contents/MacOS/AssetStudio"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  AssetStudio:
    build:
      targets: { AssetStudio: all, AssetStudioTests: [test] }
    test:
      targets: [AssetStudioTests]
